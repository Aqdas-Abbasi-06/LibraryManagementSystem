<div class="container-fluid py-4">

  <!-- Page Header -->
  <div class="page-header d-flex align-items-center gap-3 mb-4">
    <i class="fas fa-user-graduate fa-2x" style="color: #FAF3E0;"></i>
    <div>
      <h2 class="mb-0">Students</h2>
      <p class="mb-0">Manage registered library students</p>
    </div>
  </div>

  <!-- Add Student Form Card -->
  <div class="card p-4 mb-4">
    <h5 class="mb-3" style="color: var(--primary);">
      <i class="fas fa-user-plus me-2"></i>Add New Student
    </h5>
    <div class="row g-3">
      <div class="col-md-3">
        <input type="text" class="form-control" placeholder="👤 Name" [(ngModel)]="newStudent.name" />
      </div>
      <div class="col-md-3">
        <input type="email" class="form-control" placeholder="📧 Email" [(ngModel)]="newStudent.email" />
      </div>
      <div class="col-md-3">
        <input type="text" class="form-control" placeholder="📞 Phone" [(ngModel)]="newStudent.phone" />
      </div>
      <div class="col-md-3">
        <input type="text" class="form-control" placeholder="🏠 Address" [(ngModel)]="newStudent.address" />
      </div>
      <div class="col-12">
        <button class="btn btn-primary px-4" (click)="addStudent()">
          <i class="fas fa-plus me-2"></i>Add Student
        </button>
      </div>
    </div>
  </div>

  <!-- Students Table Card -->
  <div class="card p-4">
    <h5 class="mb-3" style="color: var(--primary);">
      <i class="fas fa-users me-2"></i>All Students
      <span class="badge ms-2" style="background-color: var(--secondary); font-size: 13px;">
        {{ students.length }} Students
      </span>
    </h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let student of students; let i = index">
            <td>{{ i + 1 }}</td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div style="width:36px; height:36px; border-radius:50%; background: linear-gradient(135deg, #8B6914, #C4956A); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px;">
                  {{ student.name.charAt(0).toUpperCase() }}
                </div>
                <strong>{{ student.name }}</strong>
              </div>
            </td>
            <td>{{ student.email }}</td>
            <td>{{ student.phone }}</td>
            <td>{{ student.address }}</td>
            <td>
              <button class="btn btn-danger btn-sm" (click)="deleteStudent(student.id)">
                <i class="fas fa-trash me-1"></i>Delete
              </button>
            </td>
          </tr>
          <tr *ngIf="students.length === 0">
            <td colspan="6" class="text-center py-4" style="color: var(--text-light);">
              <i class="fas fa-user-slash fa-2x mb-2 d-block" style="color: var(--border);"></i>
              No students added yet
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
